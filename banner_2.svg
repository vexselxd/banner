    <line x1="55" y1="58" x2="95" y2="58" stroke="#fffbe0" stroke-width="1.8" stroke-linecap="round"><animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/></line>
    <line x1="62" y1="45" x2="88" y2="71" stroke="#f5c842" stroke-width="1" stroke-linecap="round"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></line>
