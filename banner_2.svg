    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- FISH SILHOUETTES -->
  <ellipse cx="310" cy="208" rx="6" ry="2.5" fill="#1a4a9a">
    <animate attributeName="cx" values="310;390;310" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="10s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="600" cy="212" rx="5" ry="2" fill="#1a4a9a">
