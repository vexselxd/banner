  <circle cx="284" cy="150" r="2" fill="#f5c842"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="616" cy="150" r="2" fill="#f5c842"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>

