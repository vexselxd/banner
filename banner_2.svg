  </g>

  <!-- GOLDEN THREADS -->
  <path d="M -20 55 Q 150 20 300 65 Q 450 110 600 50 Q 720 10 920 45" fill="none" stroke="#f5c842" stroke-width="2" stroke-linecap="round" filter="url(#gold-glow)">
    <animate attributeName="opacity" values="0.5;0.85;0.5" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M -20 55 Q 150 20 300 65 Q 450 110 600 50 Q 720 10 920 45" fill="none" stroke="#f5c842" stroke-width="1" stroke-dasharray="8 14" stroke-linecap="round" opacity="0.35">
    <animate attributeName="stroke-dashoffset" from="0" to="-200" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M -20 28 Q 200 68 400 33 Q 600 -2 920 26" fill="none" stroke="#f5c842" stroke-width="1.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M -20 28 Q 200 68 400 33 Q 600 -2 920 26" fill="none" stroke="#f5c842" stroke-width="0.7" stroke-dasharray="6 16" opacity="0.25">
    <animate attributeName="stroke-dashoffset" from="0" to="-300" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M -20 105 Q 100 75 250 110 Q 420 148 580 93 Q 720 48 920 78" fill="none" stroke="#f5c842" stroke-width="1.4" stroke-linecap="round">
    <animate attributeName="opacity" values="0.4;0.65;0.4" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,6;0,0" dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M -20 105 Q 100 75 250 110 Q 420 148 580 93 Q 720 48 920 78" fill="none" stroke="#f5c842" stroke-width="0.8" stroke-dasharray="10 18" opacity="0.2">
    <animate attributeName="stroke-dashoffset" from="-100" to="100" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,6;0,0" dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M 580 12 Q 660 35 710 18 Q 755 2 795 28 Q 840 54 875 28" fill="none" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round" filter="url(#gold-glow)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <path d="M -20 130 Q 80 108 180 125 Q 290 142 380 118 Q 470 94 560 115" fill="none" stroke="#f5c842" stroke-width="1" stroke-linecap="round" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="7s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,4;0,0" dur="7s" repeatCount="indefinite"/>
  </path>

  <!-- BLUE AURORA -->
  <ellipse cx="450" cy="118" rx="280" ry="58" fill="#1a3a9a" filter="url(#blue-glow)">
    <animate attributeName="opacity" values="0.08;0.16;0.08" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="260;300;260" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- TITLE -->
  <text x="450" y="112" text-anchor="middle" font-family="'Palatino Linotype','Georgia',serif" font-size="52" font-weight="300" letter-spacing="12" fill="#e8f0ff" filter="url(#text-glow)" opacity="0.95">CHRIS</text>
  <text x="450" y="140" text-anchor="middle" font-family="'Segoe UI','Arial',sans-serif" font-size="12" font-weight="300" letter-spacing="4" fill="#f5c842" opacity="0.85">python developer · bot crafter · game builder</text>

  <!-- Deco line -->
  <line x1="290" y1="150" x2="610" y2="150" stroke="#f5c842" stroke-width="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
