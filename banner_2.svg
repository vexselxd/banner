<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010510"/>
      <stop offset="60%" stop-color="#050e2e"/>
      <stop offset="100%" stop-color="#0a1a4a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a4a"/>
      <stop offset="100%" stop-color="#010510"/>
    </linearGradient>
    <filter id="gold-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="star-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blue-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- SKY -->
  <rect width="900" height="280" fill="url(#sky)"/>

  <!-- DISTANT SILHOUETTES -->
  <ellipse cx="150" cy="175" rx="120" ry="60" fill="#0d1f4a" opacity="0.6"/>
  <ellipse cx="750" cy="175" rx="110" ry="55" fill="#0d1f4a" opacity="0.5"/>
  <ellipse cx="450" cy="180" rx="90" ry="45" fill="#0f2255" opacity="0.4"/>
  <ellipse cx="300" cy="178" rx="70" ry="40" fill="#0c1d45" opacity="0.5"/>
  <ellipse cx="620" cy="178" rx="80" ry="42" fill="#0c1d45" opacity="0.45"/>

  <!-- STAR FIELD -->
  <circle cx="80" cy="25" r="1.2" fill="#c8d8f8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="15" r="0.9" fill="#a0b8f0"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="260" cy="30" r="1.1" fill="#c8d8f8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="340" cy="18" r="0.8" fill="#a0b8f0"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="430" cy="22" r="1" fill="#c8d8f8"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
  <circle cx="520" cy="10" r="0.9" fill="#a0b8f0"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="610" cy="28" r="1.2" fill="#c8d8f8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="12" r="0.8" fill="#a0b8f0"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="790" cy="22" r="1.1" fill="#c8d8f8"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="855" cy="35" r="0.9" fill="#a0b8f0"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="130" cy="48" r="0.7" fill="#a0b8f0"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="370" cy="45" r="0.8" fill="#c8d8f8"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="480" cy="50" r="0.7" fill="#a0b8f0"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="660" cy="42" r="0.9" fill="#c8d8f8"><animate attributeName="opacity" values="0.5;1;0.5" dur="4.3s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="55" r="0.7" fill="#a0b8f0"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="50" cy="65" r="0.8" fill="#c8d8f8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="220" cy="70" r="0.7" fill="#a0b8f0"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="555" cy="65" r="0.8" fill="#c8d8f8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.9s" repeatCount="indefinite"/></circle>
  <circle cx="760" cy="68" r="0.7" fill="#a0b8f0"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="30" cy="38" r="0.8" fill="#c8d8f8"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.3s" repeatCount="indefinite"/></circle>
  <circle cx="870" cy="20" r="0.7" fill="#a0b8f0"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
  <circle cx="440" cy="60" r="0.6" fill="#c8d8f8"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="580" cy="80" r="0.7" fill="#a0b8f0"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
