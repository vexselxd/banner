  </path>
  <path d="M -50 197 Q 100 185 200 197 Q 330 210 460 197 Q 580 184 720 200 Q 850 215 1000 197 L 1000 280 L -50 280 Z" fill="#0a1e4a" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;-60,0;0,0" dur="7s" repeatCount="indefinite"/>
  </path>
  <path d="M -100 200 Q 80 190 180 202 Q 320 215 450 200 Q 590 185 740 202 Q 860 218 1000 200" fill="none" stroke="#1a4a9a" stroke-width="1.5" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0;40,0;0,0" dur="4.5s" repeatCount="indefinite"/>
  </path>
  <path d="M -100 205 Q 60 195 160 207 Q 280 220 420 205 Q 560 190 700 208 Q 820 224 1000 205" fill="none" stroke="#2a5abf" stroke-width="1" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="-30,0;30,0;-30,0" dur="5.5s" repeatCount="indefinite"/>
  </path>

  <!-- HORIZON GLOW -->
