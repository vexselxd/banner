  </line>
  <line x1="700" y1="235" x2="800" y2="235" stroke="#f5c842" stroke-width="0.3">
    <animate attributeName="opacity" values="0.05;0.18;0.05" dur="4.5s" repeatCount="indefinite"/>
  </line>

  <!-- LIGHT PARTICLES -->
  <circle cx="200" cy="210" r="1.5" fill="#f5c842">
    <animate attributeName="cx" values="200;222;200" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="215" r="1.2" fill="#f5c842">
    <animate attributeName="cx" values="650;628;650" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="225" r="1" fill="#a0b8e8">
    <animate attributeName="cx" values="380;402;380" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="530" cy="218" r="1.2" fill="#f5c842">
