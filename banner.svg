<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;max-width:900px">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010510"/>
      <stop offset="60%" stop-color="#050e2e"/>
      <stop offset="100%" stop-color="#0a1a4a"/>
    </linearGradient>
    <!-- Water gradient -->
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a4a"/>
      <stop offset="100%" stop-color="#010510"/>
    </linearGradient>
    <!-- Gold glow filter -->
    <filter id="gold-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Star glow -->
    <filter id="star-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Text glow -->
    <filter id="text-glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Blue shimmer filter -->
    <filter id="blue-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip path for waves -->
    <clipPath id="wave-clip">
      <rect x="0" y="170" width="900" height="110"/>
    </clipPath>
    <!-- Clip for sky -->
    <clipPath id="sky-clip">
      <rect x="0" y="0" width="900" height="185"/>
    </clipPath>
  </defs>

  <!-- SKY -->
  <rect width="900" height="280" fill="url(#sky)"/>

  <!-- DISTANT MOUNTAINS / SILHOUETTES -->
  <ellipse cx="150" cy="175" rx="120" ry="60" fill="#0d1f4a" opacity="0.6"/>
  <ellipse cx="750" cy="175" rx="110" ry="55" fill="#0d1f4a" opacity="0.5"/>
  <ellipse cx="450" cy="180" rx="90" ry="45" fill="#0f2255" opacity="0.4"/>
  <ellipse cx="300" cy="178" rx="70" ry="40" fill="#0c1d45" opacity="0.5"/>
  <ellipse cx="620" cy="178" rx="80" ry="42" fill="#0c1d45" opacity="0.45"/>

  <!-- STAR FIELD - small twinkling stars -->
  <!-- Star group 1 -->
  <circle cx="80" cy="25" r="1.2" fill="#c8d8f8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="15" r="0.9" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="30" r="1.1" fill="#c8d8f8">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="18" r="0.8" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="430" cy="22" r="1" fill="#c8d8f8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="10" r="0.9" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="610" cy="28" r="1.2" fill="#c8d8f8">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="12" r="0.8" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="790" cy="22" r="1.1" fill="#c8d8f8">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="855" cy="35" r="0.9" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <!-- More scattered stars -->
  <circle cx="130" cy="48" r="0.7" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="45" r="0.8" fill="#c8d8f8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="50" r="0.7" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="42" r="0.9" fill="#c8d8f8">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="55" r="0.7" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="65" r="0.8" fill="#c8d8f8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="70" r="0.7" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="555" cy="65" r="0.8" fill="#c8d8f8">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="68" r="0.7" fill="#a0b8f0">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.1s" repeatCount="indefinite"/>
  </circle>

  <!-- BIG STAR top-left (like the illustration) -->
  <g filter="url(#star-glow)">
    <line x1="75" y1="38" x2="75" y2="78" stroke="#fffbe0" stroke-width="1.8" stroke-linecap="round">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="55" y1="58" x2="95" y2="58" stroke="#fffbe0" stroke-width="1.8" stroke-linecap="round">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="62" y1="45" x2="88" y2="71" stroke="#f5c842" stroke-width="1" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="88" y1="45" x2="62" y2="71" stroke="#f5c842" stroke-width="1" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <circle cx="75" cy="58" r="4" fill="#fffbe0">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Secondary star top-right -->
  <g filter="url(#star-glow)" opacity="0.75">
    <line x1="820" y1="30" x2="820" y2="55" stroke="#fffbe0" stroke-width="1.2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="807" y1="42" x2="833" y2="42" stroke="#fffbe0" stroke-width="1.2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <circle cx="820" cy="42" r="2.5" fill="#fffbe0">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- GOLDEN THREADS ANIMATED -->
  <!-- Thread 1 - main flowing curve -->
  <path d="M -20 55 Q 150 20 300 65 Q 450 110 600 50 Q 720 10 920 45"
        fill="none" stroke="#f5c842" stroke-width="2" stroke-linecap="round" opacity="0.8" filter="url(#gold-glow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" from="0" to="-200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.85;0.5" dur="4s" repeatCount="indefinite"/>
  </path>
  <!-- Thread 1 dash -->
  <path d="M -20 55 Q 150 20 300 65 Q 450 110 600 50 Q 720 10 920 45"
        fill="none" stroke="#f5c842" stroke-width="1" stroke-dasharray="8 12" stroke-linecap="round" opacity="0.4" filter="url(#gold-glow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-200" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Thread 2 - upper gentle arc -->
  <path d="M -20 30 Q 200 70 400 35 Q 600 0 920 28"
        fill="none" stroke="#f5c842" stroke-width="1.2" stroke-linecap="round" opacity="0.5" filter="url(#gold-glow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-300" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- Thread 3 - lower swoop -->
  <path d="M -20 105 Q 100 75 250 110 Q 420 150 580 95 Q 720 50 920 80"
        fill="none" stroke="#f5c842" stroke-width="1.4" stroke-linecap="round" opacity="0.55">
    <animate attributeName="stroke-dashoffset" from="-100" to="100" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.65;0.4" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,6;0,0" dur="6s" repeatCount="indefinite"/>
  </path>

  <!-- Thread 4 - knot accent curve right -->
  <path d="M 600 15 Q 680 35 720 20 Q 760 5 800 30 Q 840 55 870 30"
        fill="none" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round" opacity="0.6" filter="url(#gold-glow)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite"/>
  </path>

  <!-- BLUE AURORA / GLOW behind text area -->
  <ellipse cx="450" cy="120" rx="280" ry="60" fill="#1a3a9a" opacity="0.12" filter="url(#blue-glow)">
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="260;300;260" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- MAIN TITLE with glow -->
  <text x="450" y="112"
        text-anchor="middle"
        font-family="'Palatino Linotype', 'Georgia', serif"
        font-size="52"
        font-weight="300"
        letter-spacing="12"
        fill="#e8f0ff"
        filter="url(#text-glow)"
        opacity="0.95">CHRIS</text>
  <!-- Subtitle -->
  <text x="450" y="138"
        text-anchor="middle"
        font-family="'Segoe UI', sans-serif"
        font-size="12"
        font-weight="300"
        letter-spacing="4"
        fill="#f5c842"
        opacity="0.85">python developer · bot crafter · game builder</text>

  <!-- Decorative line + dots -->
  <line x1="300" y1="148" x2="600" y2="148" stroke="#f5c842" stroke-width="0.5" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </line>
  <circle cx="294" cy="148" r="2" fill="#f5c842" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="606" cy="148" r="2" fill="#f5c842" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- WATER / OCEAN BASE -->
  <rect x="0" y="170" width="900" height="110" fill="url(#water)"/>

  <!-- WAVE LAYERS - animated -->
  <!-- Wave 1 - dark base -->
  <path d="M -100 185 Q 0 175 100 185 Q 200 195 300 185 Q 400 175 500 185 Q 600 195 700 185 Q 800 175 900 185 L 900 280 L -100 280 Z"
        fill="#071530" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0,0;50,0;0,0" dur="6s" repeatCount="indefinite"/>
  </path>

  <!-- Wave 2 -->
  <path d="M -100 190 Q 50 178 150 190 Q 280 202 400 190 Q 520 178 650 192 Q 780 206 950 190 L 950 280 L -100 280 Z"
        fill="#081840" opacity="0.85">
    <animateTransform attributeName="transform" type="translate" values="50,0;0,0;50,0" dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- Wave 3 - mid -->
  <path d="M -50 197 Q 100 185 200 197 Q 330 210 460 197 Q 580 184 720 200 Q 850 215 1000 197 L 1000 280 L -50 280 Z"
        fill="#0a1e4a" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;-60,0;0,0" dur="7s" repeatCount="indefinite"/>
  </path>

  <!-- Wave 4 - lighter top edge -->
  <path d="M -100 200 Q 80 190 180 202 Q 320 215 450 200 Q 590 185 740 202 Q 860 218 1000 200"
        fill="none" stroke="#1a4a9a" stroke-width="1.5" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0;40,0;0,0" dur="4.5s" repeatCount="indefinite"/>
  </path>
  <!-- Wave 5 - subtle highlight -->
  <path d="M -100 205 Q 60 195 160 207 Q 280 220 420 205 Q 560 190 700 208 Q 820 224 1000 205"
        fill="none" stroke="#2a5abf" stroke-width="1" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="-30,0;30,0;-30,0" dur="5.5s" repeatCount="indefinite"/>
  </path>

  <!-- GOLDEN REFLECTION in water -->
  <ellipse cx="450" cy="218" rx="200" ry="12" fill="#f5c842" opacity="0.08">
    <animate attributeName="rx" values="180;220;180" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.05;0.12;0.05" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="450" cy="230" rx="130" ry="7" fill="#f5c842" opacity="0.06">
    <animate attributeName="rx" values="110;150;110" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Water shimmer lines -->
  <line x1="200" y1="222" x2="350" y2="222" stroke="#f5c842" stroke-width="0.5" opacity="0.2">
    <animate attributeName="x1" values="200;180;200" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="350;370;350" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="400" y1="228" x2="520" y2="228" stroke="#f5c842" stroke-width="0.4" opacity="0.15">
    <animate attributeName="opacity" values="0.08;0.22;0.08" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="560" y1="220" x2="680" y2="220" stroke="#a0b8e8" stroke-width="0.4" opacity="0.2">
    <animate attributeName="x1" values="560;540;560" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3.5s" repeatCount="indefinite"/>
  </line>

  <!-- Small floating light particles -->
  <circle cx="200" cy="210" r="1.5" fill="#f5c842" opacity="0.5">
    <animate attributeName="cx" values="200;220;200" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="215" r="1.2" fill="#f5c842" opacity="0.4">
    <animate attributeName="cx" values="650;630;650" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="225" r="1" fill="#a0b8e8" opacity="0.4">
    <animate attributeName="cx" values="380;400;380" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- HORIZON GLOW - subtle blue light at water line -->
  <rect x="0" y="165" width="900" height="20" fill="#1a3a8a" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating small fish silhouette hint -->
  <ellipse cx="310" cy="208" rx="6" ry="2.5" fill="#1a4a9a" opacity="0.4">
    <animate attributeName="cx" values="310;370;310" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="8s" repeatCount="indefinite"/>
  </ellipse>
</svg>
</body>
</html>
